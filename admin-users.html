<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administrace - Sprava uzivatelu</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <div>
          <h1>Sprava uzivatelu</h1>
          <p class="admin-subtitle">Prehled uzivatelu, zmena role a odhlaseni aktivni relace.</p>
        </div>
        <div class="admin-header-actions">
          <a class="auth-btn" href="/admin.html">Menu administrace</a>
          <a class="auth-btn" href="/">Zpet na mapu</a>
        </div>
      </header>

      <p id="admin-auth-info" class="admin-auth-info">Overuji prihlaseni...</p>

      <main id="admin-content" class="admin-content hidden">
        <section class="admin-section">
          <div class="admin-section-head">
            <h2>Uzivatele</h2>
            <p>Zmeny role se projevi hned po ulozeni. Aktivni relaci lze ukoncit tlacitkem Odhlasit.</p>
          </div>
          <p id="users-note" class="admin-import-note"></p>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Jmeno</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Posledni prihlaseni</th>
                  <th>Relace</th>
                  <th>Akce</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr>
                  <td colspan="6">Nacitam uzivatele...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="admin-common.js"></script>
    <script src="admin-users.js"></script>
  </body>
</html>
